name: Automated EPG Manager

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ==========================================
  # JOB 1: GENERATE CUSTOM EPG (PYTHON MATRIX)
  # ==========================================
  generate-custom:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file: [guideoe, bgoe, local, nze]

    steps:
      - uses: actions/checkout@v4

      - name: Install Python dependencies
        run: pip3 install -q lxml

      - name: Generate ${{ matrix.file }}
        working-directory: epg
        shell: bash
        run: |
          set -Eeuo pipefail
          trap 'echo "::error::${{ matrix.file }} failed at line $LINENO: $BASH_COMMAND"' ERR

          echo "::group::Generate ${{ matrix.file }}"
          
          # Membuat folder files jika belum ada
          mkdir -p files

          # Menyimpan hasil langsung ke dalam folder files
          python3 -X dev scripts/index.py \
            "files/${{ matrix.file }}.xml" \
            "scripts/main/${{ matrix.file }}.txt" \
            action@github.com \
            "GitHub Action"

          gzip -9f "files/${{ matrix.file }}.xml"
          echo "::endgroup::"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.file }}
          # Unggah langsung dari folder files
          path: epg/files/${{ matrix.file }}.xml.gz

  # ==========================================
  # JOB 2: UPDATE EXTERNAL EPG (NODE.JS)
  # ==========================================
  update-external:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout iptv-org/epg
        uses: actions/checkout@v4
        with:
          repository: iptv-org/epg
          path: iptv-org-epg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: iptv-org-epg/package-lock.json

      - name: Install Node dependencies
        run: |
          cd iptv-org-epg
          npm ci

      - name: Run Update Script
        run: bash epg/scripts/epg-id.sh

      - uses: actions/upload-artifact@v4
        with:
          name: external-epg-files
          path: epg/files/

  # ==========================================
  # JOB 3: COLLECT, MERGE, AND PUBLISH TO GIT
  # ==========================================
  publish:
    needs: [generate-custom, update-external]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Unduh semua artefak langsung ke root pekerjaan agar struktur epg/files/ kembali dengan tepat
      - name: Download All EPG Artifacts
        uses: actions/download-artifact@v4
        with:
          path: .
          merge-multiple: true

      # Satukan semua perubahan dan Push ke GitHub
      - name: Commit & Push Changes
        shell: bash
        run: |
          git config user.name "Rejopa"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Gunakan flag -f (force) untuk memastikan file .gz / .xml tidak terblokir oleh .gitignore
          git add -f epg/files/        
          
          # Menghindari error jika tidak ada perubahan baru yang perlu dicommit
          git diff-index --quiet HEAD || git commit -m "Auto Update EPG (Custom & External)"
          git pull --rebase origin main
          git push origin main
