name: aem

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: epg
  cancel-in-progress: true

jobs:
  generate-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout iptv-org/epg
        uses: actions/checkout@v4
        with:
          repository: iptv-org/epg
          path: iptv-org-epg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: iptv-org-epg/package-lock.json

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lxml requests

      - name: Generate Custom EPG
        working-directory: epg
        run: |
          set -e
          mkdir -p files

          python scripts/index.py files/bgoe.xml scripts/main/bgoe.txt "Rejopa" "robo-robo"
          python scripts/index.py files/guideoe.xml scripts/main/guideoe.txt "Rejopa" "robo-robo"
          python scripts/index.py files/local.xml scripts/main/local.txt "Rejopa" "robo-robo"
          python scripts/index.py files/nze.xml scripts/main/nze.txt "Rejopa" "robo-robo"

      - name: Update External EPG & Compress All
        run: |
          bash epg/scripts/epg-id.sh

      - name: Configure Git
        run: |
          git config user.name "Rejopa"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push Changes
        run: |
          # Tambahkan semua file .gz secara paksa ke Git tracking
          git add -f epg/files/*.gz
          
          # Jika ada file yang berubah/baru...
          if [ -n "$(git status --porcelain epg/files/)" ]; then
            git commit -m "Auto Update EPG (Custom & External) $(date -u +'%Y-%m-%d %H:%M UTC')"
            
            # Rebase menggunakan strategi '-X theirs' untuk selalu menimpa file konflik di branch main
            git pull --rebase -X theirs origin main
            git push origin main
          else
            echo "Tidak ada perubahan data EPG baru. Melewati proses commit."
          fi
