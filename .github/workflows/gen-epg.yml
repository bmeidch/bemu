name: Generate EPG

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install lxml

      - name: Configure Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Generate EPG
        working-directory: epg
        run: |
          python3 scripts/index.py guide.xml scripts/main/main.txt "action@github.com" "GitHub Action" &
          python3 scripts/index.py local.xml scripts/local/local.txt "action@github.com" "GitHub Action" &
          python3 scripts/index.py nze.xml scripts/nze/nze.txt "action@github.com" "GitHub Action" &
          wait

      - name: Compress XML
        working-directory: epg
        run: |
          gzip -9 -f guide.xml &
          gzip -9 -f local.xml &
          gzip -9 -f nze.xml &
          wait

      - name: Commit
        run: |
          git add -A
          git diff --cached --quiet && exit 0
          git commit -m "Update EPG"
          git push
