name: Generate EPG every day
on:
  schedule:
    - cron: 0 */6 * * *
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: config
        run: |
          git pull
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
      - name: generate
        run: |
          cd epg
          pwd       
          python3 -m pip install lxml
          python scripts/index.py guideoe.xml scripts/main/mainoe.txt "action@github.com" "GitHub Action"
          python scripts/index.py guideio.xml scripts/main/mainio.txt "action@github.com" "GitHub Action"          
          python scripts/index.py local.xml scripts/main/local.txt "action@github.com" "GitHub Action"
          python scripts/index.py nze.xml scripts/main/nze.txt "action@github.com" "GitHub Action"

      - name: Compress XML
        working-directory: epg
        run: |
          gzip -9 -f guideoe.xml &
          gzip -9 -f guideio.xml &
          gzip -9 -f local.xml &
          gzip -9 -f nze.xml &
          wait

      - name: Commit Changes
        run: |
          git add -A
          git commit -m "SIP Auto Update EPG"
          git push
