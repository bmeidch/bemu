name: Generate EPG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        file: [guideoe, guideio, local, nze]

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: pip3 install -q lxml

      - name: Generate ${{ matrix.file }}
        working-directory: epg
        shell: bash
        run: |
          set -Eeuo pipefail
          trap 'echo "::error::${{ matrix.file }} failed at line $LINENO: $BASH_COMMAND"' ERR

          echo "::group::Generate ${{ matrix.file }}"

          python3 -X dev scripts/index.py \
            "main/${{ matrix.file }}.xml" \
            "main/${{ matrix.file }}.txt" \
            action@github.com \
            "GitHub Action"

          gzip -9f "files/${{ matrix.file }}.xml"

          echo "::endgroup::"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.file }}
          path: epg/files/${{ matrix.file }}.xml.gz

  publish:
    needs: generate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Copy files
        run: cp artifacts/*.gz epg/

      # Commit & Push
      - name: Commit & Push
        shell: bash
        run: |
          git config user.name "Rejopa"
          git config user.email "action@github.com"

          git add epg/*.gz
          
          # Mengecek apakah ada perubahan yang siap di-commit
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan pada EPG. Lewati commit."
          else
            git commit -m "Auto Update EPG [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi
