name: Generate EPG

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  pull_request:
    branches:
      - master

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install lxml

      - name: Configure Git
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"

      - name: Generate EPG
        working-directory: epg
        run: |
          python3 scripts/index.py guide.xml scripts/main/main.txt "action@github.com" "GitHub Action" &
          python3 scripts/index.py local.xml scripts/local/local.txt "action@github.com" "GitHub Action" &
          python3 scripts/index.py nze.xml scripts/nze/nze.txt "action@github.com" "GitHub Action" &
          wait

          gzip -9 -f guide.xml &
          gzip -9 -f local.xml &
          gzip -9 -f nze.xml &
          wait

      - name: Commit changes
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update EPG"
          git push
