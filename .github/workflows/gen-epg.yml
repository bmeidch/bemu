name: Generate EPG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        file: [guideoe, bgoe, local, nze]

    steps:
      - uses: actions/checkout@v4

      - name: Install
        run: pip3 install -q lxml

      - name: Generate ${{ matrix.file }}
        working-directory: epg
        shell: bash
        run: |
          set -Eeuo pipefail
          trap 'echo "::error::${{ matrix.file }} failed at line $LINENO: $BASH_COMMAND"' ERR

          echo "::group::Generate ${{ matrix.file }}"

          python3 -X dev scripts/index.py \
            "${{ matrix.file }}.xml" \
            "scripts/main/${{ matrix.file }}.txt" \
            action@github.com \
            "GitHub Action"

          gzip -9f "${{ matrix.file }}.xml"

          echo "::endgroup::"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.file }}
          path: epg/${{ matrix.file }}.xml.gz

  publish:
    needs: generate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Mengunduh langsung ke folder tujuan agar tidak perlu perintah 'mkdir' dan 'cp'
      - uses: actions/download-artifact@v4
        with:
          path: epg/files
          merge-multiple: true
      
      - name: Commit & Push
        shell: bash
        run: |
          git config user.name "Rejopa"
          git config user.email "action@github.com"
          
          git add epg/files/*.gz
          
          # PERBAIKAN: Cek apakah benar-benar ada perubahan file sebelum commit
          if [ -n "$(git status --porcelain epg/files/)" ]; then
            git commit -m "Auto Update EPG"
            git pull --rebase origin main
            git push origin main
          else
            echo "Tidak ada perubahan data EPG baru. Melewati proses commit."
          fi
