name: Generate EPG every 12 hours

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f epg/requirements.txt ]; then
            pip install -r epg/requirements.txt
          else
            pip install lxml
          fi

      - name: Generate EPG
        working-directory: epg
        run: |
          set -e

          echo "Generating guide.xml..."
          python scripts/index.py guide.xml scripts/main/main.txt "action@github.com" "GitHub Action"

          echo "Generating local.xml..."
          python scripts/index.py local.xml scripts/local/local.txt "action@github.com" "GitHub Action"

          echo "Generating nze.xml..."
          python scripts/index.py nze.xml scripts/nze/nze.txt "action@github.com" "GitHub Action"

          echo "Compressing XML files..."
          gzip -9 -f guide.xml
          gzip -9 -f local.xml
          gzip -9 -f nze.xml

      - name: Commit and Push
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git commit -m "Update EPG $(date -u +'%Y-%m-%d %H:%M UTC')"

          git push origin HEAD:${GITHUB_REF_NAME}
