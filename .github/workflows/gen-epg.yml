name: Generate EPG

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: generate-epg
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install lxml requests

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: Generate EPG
        working-directory: epg
        run: |
          echo "Generating guide.xml..."
          python scripts/index.py guide.xml scripts/main/main.txt "action@github.com" "GitHub Action" &

          echo "Generating local.xml..."
          python scripts/index.py local.xml scripts/local/local.txt "action@github.com" "GitHub Action" &

          echo "Generating nze.xml..."
          python scripts/index.py nze.xml scripts/nze/nze.txt "action@github.com" "GitHub Action" &

          wait

      - name: Compress XML
        working-directory: epg
        run: |
          gzip -9 -f guide.xml &
          gzip -9 -f local.xml &
          gzip -9 -f nze.xml &
          wait

      - name: Commit Changes
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Auto Update EPG"
          git push
