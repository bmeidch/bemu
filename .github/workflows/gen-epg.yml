name: Generate EPG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          pip3 install -q lxml
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          cd epg
          for f in guideoe guideio local nze; do
            python3 scripts/index.py "$f.xml" "scripts/main/$f.txt" \
              action@github.com "GitHub Action"
          done
          gzip -9f *.xml

      - run: |
          git add .
          git diff --cached --quiet || {
            git commit -m "Auto Update EPG"
            git push
          }
