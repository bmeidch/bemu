name: Generate EPG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        file: [guideoe, guideio, local, nze]

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: pip3 install -q lxml requests urllib3

      - name: Generate ${{ matrix.file }}
        working-directory: epg
        shell: bash
        run: |
          set -Eeuo pipefail
          trap 'echo "::error::${{ matrix.file }} failed at line $LINENO: $BASH_COMMAND"' ERR

          echo "::group::Generate ${{ matrix.file }}"

          # Dijalankan dari folder 'epg'
          # Result akan disimpan langsung di: epg/${{ matrix.file }}.xml
          # Source dibaca dari: epg/scripts/main/${{ matrix.file }}.txt
          python3 -X dev scripts/index.py \
            "${{ matrix.file }}.xml" \
            "scripts/main/${{ matrix.file }}.txt" \
            "action@github.com" \
            "GitHub Action"

          echo "::endgroup::"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.file }}
          # epg_merger.py otomatis membuat .xml.gz di direktori kerja yang sama dengan RESULT
          path: epg/${{ matrix.file }}.xml.gz

  publish:
    needs: generate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Copy files to Target Directory
        run: cp artifacts/*.gz epg/

      - name: Commit & Push Changes
        shell: bash
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          git add epg/*.gz

          if git diff --cached --quiet; then
            print "No changes in EPG data detected."
            exit 0
          fi

          git commit -m "Auto Update EPG"
          git pull --rebase origin main
          git push
