name: Generate EPG

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  epg:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        file: [guideoe, guideio, local, nze]

    steps:
      - uses: actions/checkout@v4

      - run: |
          pip3 install -q lxml
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - working-directory: epg
        run: |
          python3 scripts/index.py \
            "${{ matrix.file }}.xml" \
            "scripts/main/${{ matrix.file }}.txt" \
            action@github.com "GitHub Action"

          gzip -9f "${{ matrix.file }}.xml"

      - run: |
          git add epg/${{ matrix.file }}.xml.gz
          git diff --cached --quiet || {
            git commit -m "Update ${{ matrix.file }}"
            git push
          }
