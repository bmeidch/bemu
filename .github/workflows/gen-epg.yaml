name: Generate EPG

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: epg
  cancel-in-progress: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: epg/requirements.txt

      - name: Configure Git
        run: |
          git config user.name "Rejopa"
          git config user.email "action@github.com"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          pip install lxml requests
          

      - name: Generate EPG
        working-directory: epg/files/
        run: |
          set -e

          python scripts/index.py guide.xml scripts/main/main.txt "Rejopa" "GitHub Action"
          python scripts/index.py local.xml scripts/main/local.txt "Rejopa" "GitHub Action"
          python scripts/index.py nze.xml scripts/main/nze.txt "Rejopa" "GitHub Action"

          gzip -9f guide.xml
          gzip -9f local.xml
          gzip -9f nze.xml

      - name: Commit changes
        run: |
          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update EPG $(date -u +'%Y-%m-%d %H:%M UTC')"

      - name: Push changes
        run: |
          git push origin HEAD:${GITHUB_REF_NAME}
