name: Update EPG

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout iptv-org/epg
        uses: actions/checkout@v4
        with:
          repository: iptv-org/epg
          path: iptv-org-epg

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: iptv-org-epg/package-lock.json

      - name: Update EPG
        run: bash epg/scripts/epg-id.sh

      - name: Configure Git
        run: |
          git config user.name "Rejopa"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and Push
        run: |
          git add epg/files/
          # Memeriksa apakah ada file baru (.xz / .gz) di folder epg/files/
          if [ -n "$(git status --porcelain epg/files/)" ]; then
            git commit -m "Update EPG"
            git push origin main
          else
            echo "Tidak ada perubahan data EPG baru. Melewati proses commit."
          fi
