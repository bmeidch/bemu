name: Update Pijar TV

on:
  schedule:
    # Setiap 6 jam
    - cron: "0 */6 * * *"

  # Bisa dijalankan manual
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-pijartv
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Generate Pijar TV playlist
        run: node index.js

      - name: Show generated playlist
        run: |
          echo "=== pijartv.m3u ==="
          cat pijartv.m3u

      - name: Commit updated playlist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "Rejopa@users.noreply.github.com"

          git add pijartv.m3u

          if git diff --cached --quiet; then
            echo "Tidak ada perubahan."
            exit 0
          fi

          git commit -m "Update Pijar TV stream"
          git push
